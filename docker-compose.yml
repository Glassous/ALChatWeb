services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev # 使用开发环境的 Dockerfile
    container_name: alchat-backend
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "${HOST_PORT:-8080}:${PORT:-8080}"
    volumes:
      - ./backend:/app           # 挂载代码目录，实现热重载
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
      - mysql
      - redis
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - alchat-shared  # 连接共享网络以访问 FiaLangChain 容器


  mongodb:
    image: mongo:latest
    container_name: alchat-mongodb
    ports:
      - "${MONGODB_HOST_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  mysql:
    image: mysql:latest
    container_name: alchat-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: alchat
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: alchat-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mongodb_data:
  mysql_data:
  redis_data:

networks:
  default: {}  # alchatweb 内部网络（backend/mongo/mysql/redis）
  alchat-shared:
    external: true  # 必须提前创建: docker network create alchat-shared