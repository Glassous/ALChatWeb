<?xml version="1.0" encoding="UTF-8"?>
<svg id="logo-horizontal-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 110" class="w-full max-w-[400px] h-auto transition-transform duration-500 ease-out group-hover:scale-105">
                    <g id="logo-body-horizontal">
                        <!-- A-L 连体主路径：将右侧的横线大幅拉长至 x=240 -->
                        <path d="M 20 80 L 70 20 L 80 80 L 240 80 M 45 50 L 75 50" fill="none" stroke="#09090b" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
                        
                        <!-- 加入 Chat 字样，使用相同的无衬线字体，搭配斜体以呼应A的倾斜动感 -->
                        <text x="95" y="69" font-family="'Inter', sans-serif" font-weight="900" font-style="italic" font-size="44" fill="#09090b" letter-spacing="-0.02em">Chat</text>
                    </g>
                </svg>