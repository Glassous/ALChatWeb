services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev # 使用开发环境的 Dockerfile
    container_name: alchat-backend
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app           # 挂载代码目录，实现热重载
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
    restart: unless-stopped

  mongodb:
    image: mongo:latest
    container_name: alchat-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db  # 挂载数据卷，防止容器重启后数据库数据丢失
    restart: unless-stopped

volumes:
  mongodb_data:                # 声明数据卷