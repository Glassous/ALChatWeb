services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev # 使用开发环境的 Dockerfile
    container_name: alchat-backend
    ports:
      - "9080:9080"
    volumes:
      - ./backend:/app           # 挂载代码目录，实现热重载
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  mongodb:
    image: mongo:latest
    container_name: alchat-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: alchat-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mongodb_data:
  redis_data: